<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8fafc;
            --sf: #fff;
            --tx: #0f172a;
            --tx2: #475569;
            --tx3: #94a3b8;
            --ac: #4f46e5;
            --ac2: #eef2ff;
            --bd: #e2e8f0;
            --f: system-ui, -apple-system, "Segoe UI", sans-serif;
            --m: "SF Mono", "Fira Code", monospace;
            --mw: 860px;
            --sg: 2.5rem;
        }

        html { font-size: 16px; }
        body {
            font-family: var(--f);
            background: var(--bg);
            color: var(--tx);
            line-height: 1.6;
        }
        a { color: var(--ac); text-decoration: none; }

        .pg { max-width: var(--mw); margin: 0 auto; padding: 2.5rem 2rem 4rem; }

        .hd {
            display: flex;
            gap: 1.75rem;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--bd);
        }
        .av {
            width: 144px;
            height: 144px;
            border-radius: 50%;
            touch-action: none;
        }
        .hd h1 {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .hd .rl {
            color: var(--ac);
            font-size: 1rem;
            font-weight: 500;
            margin-top: 0.2rem;
        }
        .ct {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 1.2rem;
            margin-top: 0.6rem;
            font-size: 0.85rem;
            color: var(--tx2);
        }
        .ct .d { color: var(--bd); }
        .pl {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .pl a {
            padding: 0.2rem 0.6rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--ac);
            text-decoration: none;
        }

        .sc { margin-top: var(--sg); }
        .st {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--tx3);
            margin-bottom: 1rem;
        }

        .sm { font-size: 1rem; color: var(--tx2); line-height: 1.75; }

        .en { margin-bottom: 1.75rem; }
        .en:last-child, .aw:last-child, .pj:last-child { margin-bottom: 0; }
        .et {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.5rem;
        }
        .er { font-size: 1rem; font-weight: 600; }
        .ed, .edy {
            font-size: 0.78rem;
            font-family: var(--m);
            color: var(--tx3);
        }
        .ed { white-space: nowrap; }
        .eo {
            font-size: 0.9rem;
            color: var(--ac);
            font-weight: 500;
            margin-top: 0.1rem;
        }
        .es, .as {
            font-size: 0.85rem;
            color: var(--tx2);
            margin-top: 0.3rem;
            line-height: 1.6;
        }
        .eh { margin-top: 0.5rem; padding-left: 1.2rem; color: var(--tx2); }
        .eh li {
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            line-height: 1.6;
        }

        .sg {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }
        .sk {
            background: var(--sf);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 1rem 1.2rem;
        }
        .sn { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem; }
        .stg { display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .stg span {
            padding: 0.15rem 0.55rem;
            font-size: 0.78rem;
            background: var(--ac2);
            border-radius: 4px;
            color: var(--ac);
        }

        .aw { margin-bottom: 1.2rem; }
        .edd, .at, .pn { font-size: 0.9rem; font-weight: 600; }
        .am { font-size: 0.78rem; color: var(--tx3); margin-top: 0.1rem; }
        .edi { font-size: 0.85rem; color: var(--tx2); margin-top: 0.1rem; }

        .pj { margin-bottom: 1.4rem; }

        @media (max-width: 640px) {
            .pg { padding: 1.5rem 1rem 2rem; }
            .hd {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            .av { width: 110px; height: 110px; }
            .hd h1 { font-size: 1.5rem; }
            .ct { justify-content: center; }
            .pl { justify-content: center; }
            .sg { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="pg">
        {% if avatar_mesh_b64 %}
        <canvas id="avatar" class="av" width="144" height="144"></canvas>
        {% endif %}
    </div>
    <script>
        (async function () {
            {# ── Shared decompress ── #}
            var D = "div", N = "\n", T = "\t", SP = "span";
            function dz(b) { var r = Uint8Array.from(atob(b), function (c) { return c.charCodeAt(0); }); var d = new DecompressionStream("deflate"); var w = d.writable.getWriter(); w.write(r); w.close(); return new Response(d.readable).arrayBuffer(); }

            {# ── Helpers ── #}
            function e(t, c, h) { var n = document.createElement(t); if (c) n.className = c; if (h) n.innerHTML = h; return n; }
            function sc(title) { var s = e("section", "sc"); s.appendChild(e("h2", "st", title)); return s; }
            function hl(items) { var ul = e("ul", "eh"); items.forEach(function (t) { ul.appendChild(e("li", "", t)); }); return ul; }

            {# ── Decompress resume data ── #}
            var t = new TextDecoder().decode(new Uint8Array(await dz("{{ resume_data_b64 }}")));
            var s = t.split(N + N), p = document.querySelector(".pg");

            {# ── Header ── #}
            var b = s[0].split(N), hd = e("header", "hd");
            var av = document.getElementById("avatar");
            if (av) hd.appendChild(av);
            var di = e(D);
            di.appendChild(e("h1", "", b[0]));
            if (b[1]) di.appendChild(e(D, "rl", b[1]));
            var ct = e(D, "ct"); ct.innerHTML = b[3];
            di.appendChild(ct);
            var pl = e(D, "pl"); pl.innerHTML = b[4].split('href="').join('href="//');

            di.appendChild(pl);
            hd.appendChild(di);
            p.appendChild(hd);

            {# ── Summary ── #}
            if (b[2]) { var sm = sc("Summary"); sm.appendChild(e("p", "sm", b[2])); p.appendChild(sm); }

            {# ── Experience ── #}
            var wk = s[1].split("--" + N), sx = sc("Experience");
            wk.forEach(function (w) {
                w = w.trim(); if (!w) return;
                var l = w.split(N), f = l[0].split(T), n = e(D, "en");
                var et = e(D, "et");
                et.appendChild(e(SP, "er", f[1]));
                et.appendChild(e(SP, "ed", f[2]));
                n.appendChild(et);
                n.appendChild(e(D, "eo", f[3]));
                if (f[4]) n.appendChild(e("p", "es", f[4]));
                if (l.length > 1) n.appendChild(hl(l.slice(1)));
                sx.appendChild(n);
            });
            p.appendChild(sx);

            {# ── Skills ── #}
            var sk = s[2].split(N), s2 = sc("Skills"), sg = e(D, "sg");
            sk.forEach(function (r) {
                if (!r) return;
                var f = r.split(T), d = e(D, "sk");
                d.appendChild(e(D, "sn", f[0]));
                var tg = e(D, "stg");
                for (var i = 1; i < f.length; i++) tg.appendChild(e(SP, "", f[i]));
                d.appendChild(tg); sg.appendChild(d);
            });
            s2.appendChild(sg); p.appendChild(s2);

            {# ── Projects (skip if empty) ── #}
            if (s[3].trim()) {
                var pj = s[3].split("--" + N), s3 = sc("Open Source &amp; Projects");
                pj.forEach(function (v) {
                    v = v.trim(); if (!v) return;
                    var l = v.split(N), f = l[0].split(T), d = e(D, "pj");
                    d.appendChild(e(D, "pn", f[1]));
                    if (f[2]) d.appendChild(e("p", "es", f[2]));
                    if (l.length > 1) d.appendChild(hl(l.slice(1)));
                    s3.appendChild(d);
                });
                p.appendChild(s3);
            }

            {# ── Awards & Recognition ── #}
            var aw = s[4].split(N), s4 = sc("Awards &amp; Recognition");
            aw.forEach(function (r) {
                if (!r) return;
                var f = r.split(T), d = e(D, "aw");
                d.appendChild(e(D, "at", f[0]));
                if (f[1]) d.appendChild(e(D, "am", f[1]));
                if (f[2]) d.appendChild(e("p", "as", f[2]));
                s4.appendChild(d);
            });
            p.appendChild(s4);

            {# ── Education ── #}
            var ed = s[5].split(N), s5 = sc("Education");
            ed.forEach(function (r) {
                if (!r) return;
                var f = r.split(T), d = e(D, "en"), et = e(D, "et");
                et.appendChild(e(SP, "edd", f[0]));
                et.appendChild(e(SP, "edy", f[1]));
                d.appendChild(et);
                d.appendChild(e(D, "edi", f[2]));
                s5.appendChild(d);
            });
            p.appendChild(s5);

            document.title = b[0] + (b[1] ? " \u2014 " + b[1] : "");

            {# ── Avatar with 1-level tessellation ── #}
            {% if avatar_mesh_b64 %}
            if (av) {
                var buf = new Uint8Array(await dz("{{ avatar_mesh_b64 }}"));
                var dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
                var hr = buf[0] / 10, ib = buf[1], ncells = dv.getUint16(2, true), o = 4;
                var nc = (1 << ib) - 1, mask = nc;
                var pR = [], pG = [], pB = [];
                for (var i = 0; i < nc; i++) { pR.push(buf[o++]); pG.push(buf[o++]); pB.push(buf[o++]); }
                var idx = [], bb = 0, bn = 0;
                for (var i = 0; i < ncells; i++) { while (bn < ib) { bb = (bb << 8) | buf[o++]; bn += 8; } bn -= ib; idx.push((bb >> bn) & mask); }

                var S = 144, cr = 72;
                var hrc = hr * 2;

                {# Generate hex grid at given radius with boundary margin #}
                function grd(r, m) {
                    var g = [], dx = Math.sqrt(3) * r, dy = 1.5 * r;
                    for (var row = 0; row < S / dy + 2; row++)
                        for (var col = 0; col < S / dx + 2; col++) {
                            var cx = col * dx + (row % 2 ? dx / 2 : 0), cy = row * dy;
                            if (Math.sqrt((cx - cr) * (cx - cr) + (cy - cr) * (cy - cr)) + r * m <= cr) g.push([cx, cy]);
                        }
                    return g;
                }
                var fc = grd(hr, 0.8), cc = grd(hrc, 0.8);

                function hvx(r) {
                    var x = [], y = [];
                    for (var v = 0; v < 6; v++) { var a = (Math.PI / 180) * (60 * v - 30); x.push(Math.cos(a) * r); y.push(Math.sin(a) * r); }
                    return [x, y];
                }
                var fv = hvx(hr + 0.3), cv = hvx(hrc);

                {# Average fine cell colors for each coarse cell #}
                var ci = [], th = hrc * hrc;
                for (var i = 0; i < cc.length; i++) {
                    var sr = 0, sg = 0, sb = 0, cnt = 0;
                    for (var j = 0; j < fc.length; j++) {
                        var dx = cc[i][0] - fc[j][0], dy = cc[i][1] - fc[j][1];
                        if (dx * dx + dy * dy < th && idx[j]) {
                            sr += pR[idx[j] - 1]; sg += pG[idx[j] - 1]; sb += pB[idx[j] - 1]; cnt++;
                        }
                    }
                    ci.push(cnt ? "rgb(" + (sr / cnt | 0) + "," + (sg / cnt | 0) + "," + (sb / cnt | 0) + ")" : null);
                }

                {# Track activation for coarse cells (to suppress on hover) #}
                var cT = new Float32Array(cc.length), cH = new Float32Array(cc.length);
                var can = av, ctx = can.getContext("2d");
                var mx = -999, my = -999, hov = false, af = null;

                function pos(ev) { var r = can.getBoundingClientRect(); mx = (ev.clientX - r.left) * S / r.width; my = (ev.clientY - r.top) * S / r.height; }
                can.onpointerenter = function () { hov = true; };
                can.onpointerleave = function () { hov = false; mx = my = -999; };
                can.onpointermove = function (ev) { pos(ev); if (!af) af = requestAnimationFrame(tick); };

                function tick(ts) {
                    var now = ts / 1000, any = false;
                    for (var i = 0; i < cc.length; i++) {
                        var dx = cc[i][0] - mx, dy = cc[i][1] - my;
                        if (hov && Math.sqrt(dx * dx + dy * dy) < 28) { cH[i] = now; cT[i] = 1; }
                        else if (cT[i] > 0) { if (now - cH[i] > 3) cT[i] = 0; any = true; }
                    }
                    draw();
                    af = any || hov ? requestAnimationFrame(tick) : null;
                }

                function draw() {
                    ctx.clearRect(0, 0, S, S);
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(cr, cr, cr, 0, Math.PI * 2);
                    ctx.clip();
                    {# Pass 1: all fine hexes (base layer, always drawn) #}
                    for (var i = 0; i < fc.length; i++) {
                        if (!idx[i]) continue;
                        ctx.beginPath();
                        for (var v = 0; v < 6; v++) { v ? ctx.lineTo(fc[i][0] + fv[0][v], fc[i][1] + fv[1][v]) : ctx.moveTo(fc[i][0] + fv[0][v], fc[i][1] + fv[1][v]); }
                        ctx.closePath();
                        ctx.fillStyle = "rgb(" + pR[idx[i] - 1] + "," + pG[idx[i] - 1] + "," + pB[idx[i] - 1] + ")";
                        ctx.fill();
                    }
                    {# Pass 2: coarse hexes on top, skip activated ones to reveal fine detail #}
                    for (var i = 0; i < cc.length; i++) {
                        if (!ci[i] || cT[i]) continue;
                        ctx.beginPath();
                        for (var v = 0; v < 6; v++) { v ? ctx.lineTo(cc[i][0] + cv[0][v], cc[i][1] + cv[1][v]) : ctx.moveTo(cc[i][0] + cv[0][v], cc[i][1] + cv[1][v]); }
                        ctx.closePath();
                        ctx.fillStyle = ci[i];
                        ctx.fill();
                    }
                    ctx.restore();
                }

                draw();
            }
            {% endif %}
        })();
    </script>
</body>
</html>
